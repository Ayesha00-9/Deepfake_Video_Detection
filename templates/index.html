<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Deepfake Detection System</title>

    <style>
        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background: linear-gradient(135deg, #1d2671, #c33764);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #ffffff;
            width: 420px;
            padding: 35px;
            border-radius: 14px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 10px;
            color: #1d2671;
        }

        p.subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 25px;
        }

        input[type="file"] {
            width: 100%;
            padding: 10px;
            border: 2px dashed #ccc;
            border-radius: 8px;
            cursor: pointer;
        }

        button {
            margin-top: 20px;
            padding: 12px 25px;
            background: #1d2671;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #16205c;
        }

        .result-box {
            margin-top: 25px;
            padding: 15px;
            border-radius: 10px;
            background: #f4f6f8;
        }

        .fake {
            color: #d63031;
            font-weight: bold;
            font-size: 18px;
        }

        .real {
            color: #2ecc71;
            font-weight: bold;
            font-size: 18px;
        }

        .confidence {
            margin-top: 8px;
            font-size: 14px;
            color: #555;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🎥 Deepfake Video Detection</h2>
    <p class="subtitle">Upload a video to check whether it is Real or Fake</p>

    <form method="POST" enctype="multipart/form-data">
        <input type="file" name="video" accept="video/*" required>
        <button type="submit">Analyze Video</button>
    </form>

    {% if result %}
        <div class="result-box">
            <div class="{{ 'fake' if result == 'FAKE' else 'real' }}">
                {{ result }}
            </div>
            <div class="confidence">
                Confidence: {{ confidence }}%
            </div>
        </div>
    {% endif %}
<br>
<a href="/dashboard">
    <button type="button" style="background:#0984e3;">
        View Dashboard
    </button>
</a>

    <div class="footer">
        Final Year Project • Real-Time Deepfake Detection
    </div>
</div>

</body>
</html>
